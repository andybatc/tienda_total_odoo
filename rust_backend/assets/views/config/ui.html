{% extends "base.html" %}

{% block content %}
<div class="container" style="margin-top: 50px;">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card">
                <div class="card-header">
                    <h3>Configuración de Token Odoo</h3>
                </div>
                <div class="card-body">
                    <p><strong>Token Actual:</strong>
                        <span class="badge bg-info text-dark">{{ current_token }}</span>
                    </p>

                    <form action="/api/config/ui" method="post">
                        <div class="mb-3">
                            <label for="token" class="form-label">Nuevo Token</label>
                            <input type="text" name="token" id="token" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
